name: CI Pipeline

on:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - "ai/**"
      - "test-tracking/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "ai/**"
      - "test-tracking/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'test-tracking/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            ai:
              - 'ai/**'
              - '.github/workflows/ci.yml'

  test-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    env:
      BUILD_ID: "${{ github.run_number }}-${{ github.sha }}"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov httpx ruff pyarrow pytest-json-report

      - name: Lint Backend (Ruff)
        run: ruff check backend/src backend/tests

      - name: Check Backend Format (Ruff)
        run: ruff format --check backend/src backend/tests

      - name: Run Backend Tests with Coverage
        env:
          PYTHONPATH: backend/src
        run: |
          BUILD_SHORT="${{ github.run_number }}-$(echo ${{ github.sha }} | cut -c1-7)"
          mkdir -p test-tracking/results
          pytest backend/tests -v \
            --ignore=backend/tests/e2e \
            --cov=ai_wildfire_tracker \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html:backend/htmlcov \
            --cov-fail-under=75 \
            --junitxml=backend-test-results-${BUILD_SHORT}.xml \
            --json-report \
            --json-report-file=test-tracking/results/build-${BUILD_SHORT}.json \
            --json-report-summary
      - name: Generate Test History Report
        if: always()
        run: |
          python3 test-tracking/generate_report.py --summary >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 test-tracking/generate_report.py 2>/dev/null >> $GITHUB_STEP_SUMMARY || true

      - name: Upload Backend Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "backend-test-results-${{ github.run_number }}-${{ github.sha }}"
          path: |
            backend-test-results-*.xml
            coverage.xml
            test-tracking/results/build-*.json

  test-performance:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run Performance Tests
        env:
          PYTHONPATH: backend/src
        run: |
          pytest backend/tests/performance/ -v \
            --junitxml=performance-test-results.xml

      - name: Upload Performance Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "performance-test-results-${{ github.run_number }}"
          path: performance-test-results.xml

  test-security:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run Security Tests
        env:
          PYTHONPATH: backend/src
        run: |
          pytest backend/tests/security/ -v \
            --junitxml=security-test-results.xml

      - name: Upload Security Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "security-test-results-${{ github.run_number }}"
          path: security-test-results.xml

  test-integration:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run Integration Tests
        env:
          PYTHONPATH: backend/src
        run: |
          pytest backend/tests/integration/ -v \
            --junitxml=integration-test-results.xml

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "integration-test-results-${{ github.run_number }}"
          path: integration-test-results.xml

  test-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Dependencies
        run: npm ci
      - name: Run Frontend Tests
        run: npm test -- --run
      - name: Build Frontend
        run: npm run build
      - name: Audit Frontend Dependencies
        run: npm audit --audit-level=critical

  test-ai:
    needs: changes
    if: ${{ needs.changes.outputs.ai == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Dependencies
        run: |
          pip install -r ai/requirements.txt
          pip install ruff pytest-cov
      - name: Lint AI Module (Ruff)
        run: ruff check ai/src
      - name: Check AI Format (Ruff)
        run: ruff format --check ai/src
      - name: Run AI/ML Tests
        env:
          PYTHONPATH: ai/src
        run: |
          pytest ai/src/ai_wildfire/tests/ -v \
            --cov=ai_wildfire \
            --cov-report=term-missing \
            --cov-fail-under=60

  test-e2e:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Backend Dependencies
        run: pip install -r ../backend/requirements.txt
      - name: Install Frontend Dependencies
        run: npm ci
      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium
      - name: Run End-to-End Tests
        run: npm run test:e2e
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
  
  security-scan:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit on Backend Source
        run: bandit -r backend/src/ -ll

      - name: Run pip-audit on Backend Dependencies
        continue-on-error: true
        run: pip-audit -r backend/requirements.txt